security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: patients_list
            logout:
                path: app_logout

    access_control:
        - { path: ^/patients, roles: ROLE_ADMIN }
        - { path: ^/appointment/new, roles: [ROLE_DOCTOR, ROLE_ADMIN] }
        - { path: ^/patient/\d+, roles: IS_AUTHENTICATED_FULLY } # только авторизованные
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }