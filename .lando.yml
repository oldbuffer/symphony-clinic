name: clinic
recipe: symfony
config:
  php: '8.3'
  webroot: clinic/public
  database: postgres:16
  xdebug: true
proxy:
  appserver:
    - clinic.lndo.site
tooling:
  composer:
    service: appserver
    cmd: php -d memory_limit=-1 /usr/local/bin/composer --working-dir=/app/clinic
  console:
    service: appserver
    cmd: php /app/clinic/bin/console